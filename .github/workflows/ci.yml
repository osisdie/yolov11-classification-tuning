name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install flake8 isort
      - name: Run flake8
        run: flake8 --max-line-length=120 --ignore=E203 --select=E,W,F *.py
      - name: Check import order
        run: isort --check-only --diff *.py

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - name: Verify imports
        run: python -c "from ultralytics import YOLO; import matplotlib; import numpy; print('All imports OK')"
